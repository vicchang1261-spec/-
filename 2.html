<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加法俄羅斯：目標10</title>
    <!-- 引入美化工具 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心引擎 (直接在瀏覽器跑 React) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-hidden">
    <div id="root"></div>

    <script>
        const { useState, useEffect, useCallback, useRef } = React;

        const COLS = 6;
        const ROWS = 12;
        const TARGET_SUM = 10;

        const getBlockStyle = (val) => {
            const styles = {
                0: 'bg-slate-800 border-slate-700 text-transparent shadow-none',
                1: 'bg-[#FF595E] border-[#E04E53] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                2: 'bg-[#FF924C] border-[#E08143] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                3: 'bg-[#FFCA3A] border-[#E0B233] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                4: 'bg-[#C5CA30] border-[#ADB22A] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                5: 'bg-[#8AC926] border-[#79B021] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                6: 'bg-[#36949D] border-[#2F828A] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                7: 'bg-[#1982C4] border-[#1672AC] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                8: 'bg-[#4267AC] border-[#3A5B97] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]',
                9: 'bg-[#6A4C93] border-[#5D4381] text-white shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)]'
            };
            return styles[val] || styles[0];
        };

        const createEmptyGrid = () => Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        const getRandomVal = () => Math.floor(Math.random() * 9) + 1;

        function App() {
            const [grid, setGrid] = useState(createEmptyGrid());
            const [piece, setPiece] = useState({ x: Math.floor(COLS / 2), y: 0, val: getRandomVal() });
            const [nextVal, setNextVal] = useState(getRandomVal());
            const [score, setScore] = useState(0);
            const [gameOver, setGameOver] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [comboMsg, setComboMsg] = useState(null);
            const [aiFeedback, setAiFeedback] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const level = Math.floor(score / 500) + 1;
            const speed = Math.max(150, 800 - (level - 1) * 100);

            const gameState = useRef({ grid, piece, nextVal, gameOver, isPaused, score });
            useEffect(() => {
                gameState.current = { grid, piece, nextVal, gameOver, isPaused, score };
            }, [grid, piece, nextVal, gameOver, isPaused, score]);

            const triggerLockPiece = useCallback((overridePiece = null) => {
                const { grid: currentGridState, nextVal: currentNextVal } = gameState.current;
                const currentPiece = overridePiece || gameState.current.piece;
                let newGrid = currentGridState.map(row => [...row]);
                
                if (currentPiece.y >= 0 && currentPiece.y < ROWS) {
                    newGrid[currentPiece.y][currentPiece.x] = currentPiece.val;
                } else {
                    setGameOver(true);
                    return;
                }

                let totalPoints = 0, chain = 1;
                while (true) {
                    let toClear = new Set();
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            let sum = 0, path = [];
                            for (let i = c; i < COLS; i++) {
                                if (newGrid[r][i] === 0) break;
                                sum += newGrid[r][i];
                                path.push(`${r},${i}`);
                                if (sum === TARGET_SUM) { path.forEach(p => toClear.add(p)); break; }
                                else if (sum > TARGET_SUM) break;
                            }
                        }
                    }
                    for (let c = 0; c < COLS; c++) {
                        for (let r = 0; r < ROWS; r++) {
                            let sum = 0, path = [];
                            for (let i = r; i < ROWS; i++) {
                                if (newGrid[i][c] === 0) break;
                                sum += newGrid[i][c];
                                path.push(`${i},${c}`);
                                if (sum === TARGET_SUM) { path.forEach(p => toClear.add(p)); break; }
                                else if (sum > TARGET_SUM) break;
                            }
                        }
                    }
                    if (toClear.size === 0) break;
                    totalPoints += toClear.size * 10 * chain;
                    if (chain > 1) {
                        setComboMsg(`連鎖 x${chain}!`);
                        setTimeout(() => setComboMsg(null), 1000);
                    }
                    chain++;
                    toClear.forEach(pos => { const [r, c] = pos.split(',').map(Number); newGrid[r][c] = 0; });
                    for (let c = 0; c < COLS; c++) {
                        let colVals = [];
                        for (let r = ROWS - 1; r >= 0; r--) if (newGrid[r][c] !== 0) colVals.push(newGrid[r][c]);
                        for (let r = ROWS - 1; r >= 0; r--) newGrid[r][c] = colVals.length > 0 ? colVals.shift() : 0;
                    }
                }
                setGrid(newGrid);
                if (totalPoints > 0) setScore(s => s + totalPoints);
                const spawnX = Math.floor(COLS / 2);
                if (newGrid[0][spawnX] !== 0) setGameOver(true);
                else { setPiece({ x: spawnX, y: 0, val: currentNextVal }); setNextVal(getRandomVal()); }
            }, []);

            const move = useCallback((dx, dy) => {
                const { grid: currentGrid, piece: currentPiece, gameOver, isPaused } = gameState.current;
                if (gameOver || isPaused) return;
                const newX = currentPiece.x + dx, newY = currentPiece.y + dy;
                if (newX < 0 || newX >= COLS || newY >= ROWS || currentGrid[newY][newX] !== 0) return;
                setPiece(prev => ({ ...prev, x: newX, y: newY }));
            }, []);

            const moveDown = useCallback(() => {
                const { grid: currentGrid, piece: currentPiece, gameOver, isPaused } = gameState.current;
                if (gameOver || isPaused) return;
                const newY = currentPiece.y + 1;
                if (newY >= ROWS || currentGrid[newY][currentPiece.x] !== 0) triggerLockPiece();
                else setPiece(prev => ({ ...prev, y: newY }));
            }, [triggerLockPiece]);

            const hardDrop = useCallback(() => {
                const { grid: currentGrid, piece: currentPiece, gameOver, isPaused } = gameState.current;
                if (gameOver || isPaused) return;
                let newY = currentPiece.y;
                while (newY + 1 < ROWS && currentGrid[newY + 1][currentPiece.x] === 0) newY++;
                triggerLockPiece({ ...currentPiece, y: newY });
            }, [triggerLockPiece]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    const key = e.key.toLowerCase();
                    if (['arrowleft', 'a'].includes(key)) { e.preventDefault(); move(-1, 0); }
                    else if (['arrowright', 'd'].includes(key)) { e.preventDefault(); move(1, 0); }
                    else if (['arrowdown', 's'].includes(key)) { e.preventDefault(); moveDown(); }
                    else if (['arrowup', 'w', ' '].includes(key)) { e.preventDefault(); hardDrop(); }
                    else if (key === 'escape') setIsPaused(p => !p);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [move, moveDown, hardDrop]);

            useEffect(() => {
                if (gameOver || isPaused) return;
                const interval = setInterval(moveDown, speed);
                return () => clearInterval(interval);
            }, [moveDown, speed, gameOver, isPaused]);

            const generateAIAnalysis = async () => {
                if (isAnalyzing || aiFeedback) return;
                setIsAnalyzing(true);
                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const prompt = `玩家在「加法俄羅斯：目標10」得到 ${score} 分。請扮演毒舌幽默的教練用繁體中文給 50 字內評語。`;
                try {
                    const response = await fetch(url, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const data = await response.json();
                    setAiFeedback(data.candidates[0].content.parts[0].text);
                } catch (e) { setAiFeedback("教練休息中。"); } finally { setIsAnalyzing(false); }
            };

            const displayGrid = grid.map(row => [...row]);
            if (!gameOver && piece.y < ROWS) displayGrid[piece.y][piece.x] = piece.val;

            return React.createElement('div', { className: "min-h-screen flex flex-col items-center justify-center p-4" },
                React.createElement('div', { className: "mb-6 text-center" },
                    React.createElement('h1', { className: "text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400" }, "加法俄羅斯"),
                    React.createElement('div', { className: "mt-2 bg-slate-800 px-4 py-1 rounded-full text-yellow-400 font-bold border border-slate-700" }, `目標總和: ${TARGET_SUM}`)
                ),
                React.createElement('div', { className: "flex flex-col md:flex-row gap-8 items-center" },
                    React.createElement('div', { className: "relative bg-slate-900 p-2 rounded-xl border-4 border-slate-800 shadow-2xl" },
                        comboMsg && React.createElement('div', { className: "absolute inset-x-0 top-20 text-center z-20" }, 
                            React.createElement('span', { className: "bg-yellow-400 text-black px-4 py-2 rounded-full font-black animate-bounce inline-block" }, comboMsg)
                        ),
                        React.createElement('div', { className: "grid grid-cols-6 gap-1" },
                            displayGrid.map((row, r) => row.map((val, c) => 
                                React.createElement('div', { key: `${r}-${c}`, className: `w-10 h-10 sm:w-12 sm:h-12 rounded flex items-center justify-center text-2xl font-black shadow-[inset_0px_-4px_0px_rgba(0,0,0,0.2)] ${getBlockStyle(val)}` }, val > 0 ? val : '')
                            ))
                        ),
                        gameOver && React.createElement('div', { className: "absolute inset-0 bg-slate-950/95 backdrop-blur-md flex flex-col items-center justify-center rounded-lg p-6 text-center" },
                            React.createElement('h2', { className: "text-3xl font-black text-rose-500 mb-2" }, "遊戲結束"),
                            React.createElement('div', { className: "text-slate-400 mb-4" }, `得分: ${score}`),
                            !aiFeedback && !isAnalyzing ? React.createElement('button', { onClick: generateAIAnalysis, className: "bg-indigo-600 px-4 py-2 rounded-lg font-bold mb-4 hover:bg-indigo-500 transition" }, "✨ 召喚教練評分") : 
                            React.createElement('div', { className: "text-xs text-indigo-300 mb-4 px-4 italic" }, isAnalyzing ? "撰寫中毒舌講稿..." : aiFeedback),
                            React.createElement('button', { onClick: () => window.location.reload(), className: "bg-emerald-500 text-black font-bold px-6 py-2 rounded-full hover:bg-emerald-400 transition" }, "重開一局")
                        )
                    ),
                    React.createElement('div', { className: "w-48 flex flex-col gap-4" },
                        React.createElement('div', { className: "bg-slate-900 p-4 rounded-xl border border-slate-800" },
                            React.createElement('div', { className: "text-xs text-slate-500 font-bold mb-1" }, "下一個"),
                            React.createElement('div', { className: `w-10 h-10 mx-auto rounded flex items-center justify-center text-xl font-black ${getBlockStyle(nextVal)}` }, nextVal),
                            React.createElement('div', { className: "mt-4 text-xs text-slate-500 font-bold mb-1" }, "分數"),
                            React.createElement('div', { className: "text-2xl font-black text-emerald-400 text-center" }, score)
                        ),
                        React.createElement('div', { className: "hidden md:block bg-slate-800/50 p-3 rounded text-[10px] text-slate-500 leading-relaxed text-center" }, "操作：WASD 或 方向鍵\nW / Space：瞬間下墜"),
                        React.createElement('div', { className: "md:hidden grid grid-cols-4 gap-2" },
                            ['⬅️', '⬇️', '➡️', '🚀'].map((icon, i) => React.createElement('button', { 
                                key: i,
                                onPointerDown: (e) => { e.preventDefault(); [()=>move(-1,0), moveDown, ()=>move(1,0), hardDrop][i]() },
                                className: "bg-slate-800 p-4 rounded-xl active:bg-slate-700 text-xl"
                            }, icon))
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
